name: Newman API Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    outputs:
      test_result: ${{ steps.test_run.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Newman tests
        id: test_run
        run: npm test

      - name: Install Allure CLI
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Restore Allure history
        if: always()
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || echo "No gh-pages branch yet, skipping history restore"
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            mkdir -p allure-results/history
            git checkout origin/gh-pages -- history 2>/dev/null || echo "No history folder yet"
            if [ -d history ]; then
              cp -r history/. allure-results/history/
              echo "History restored successfully"
            fi
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Save Allure history for next run
        if: always()
        run: |
          cp -r allure-report/history ./history

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Commit history to gh-pages branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          if [ -d history_backup ]; then rm -rf history; mv history_backup history; fi
          cp -r history ./history 2>/dev/null || true
          git add history/
          git diff --cached --quiet || git commit -m "chore: update allure history [skip ci]"
          git push origin gh-pages
          git checkout main
          git stash pop 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ needs.test.outputs.test_result == 'success' && '✅ Tests passed' || '❌ Tests failed' }} — rest-api-automation-newman",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.test.outputs.test_result == 'success' && '✅ Tests passed' || '❌ Tests failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Proyecto:*\nrest-api-automation-newman"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Rama:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.event.head_commit.message }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Ejecutado por:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Ver reporte Allure"
                      },
                      "url": "https://emilianoqa.github.io/rest-api-automation-newman/"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Ver ejecución"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
